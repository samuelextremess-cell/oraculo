<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oráculo - Chat IA</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #e2e8f0;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      margin: 0 auto;
      padding: 10px;
    }
    h1 {
      text-align: center;
      padding: 10px 0;
      font-size: 1.4rem;
    }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: var(--surface);
      border-radius: 12px;
      margin-bottom: 10px;
    }
    .message {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .user-msg {
      background: var(--primary);
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .bot-msg {
      background: #1e3a5f;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }
    .bot-msg.loading {
      background: #2a3a4f;
      color: #94a3b8;
      font-style: italic;
    }
    .controls {
      display: grid;
      gap: 10px;
      background: var(--surface);
      padding: 15px;
      border-radius: 12px;
    }
    select, button, input {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
    }
    select:focus, input:focus {
      border-color: var(--primary);
    }
    button {
      background: var(--primary);
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .input-row {
      display: flex;
      gap: 8px;
    }
    #user-input { flex: 1; }
    .model-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .model-row label {
      white-space: nowrap;
      font-size: 0.9rem;
    }
    .model-row select { flex: 1; }
  </style>
</head>
<body>
  <h1>Oráculo</h1>
  <div id="chat-box"></div>
  <div class="controls">
    <div class="model-row">
      <label for="model-select">Modelo:</label>
      <select id="model-select">
        <option value="auto">Auto (IA escolhe)</option>
        <option value="deepseek">DeepSeek</option>
      </select>
    </div>
    <div class="input-row">
      <input type="text" id="user-input" placeholder="Digite sua mensagem..." />
      <button id="send-btn" onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    const CONFIG = {
      HF_TOKEN: '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',
      DS_TOKEN: 'sk-b1f991113c7a4085b27614b8af309919',
      GITHUB_TOKEN: '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',
      GITHUB_REPO: 'samuelextremess-cell/oraculo',
      GITHUB_BRANCH: 'main'
    };

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const modelSelect = document.getElementById('model-select');
    const sendBtn = document.getElementById('send-btn');

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}-msg`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const msg = userInput.value.trim();
      if (!msg) return;

      addMessage(msg, 'user');
      userInput.value = '';
      sendBtn.disabled = true;

      const loadingMsg = addMessage('Pensando...', 'bot');
      loadingMsg.classList.add('loading');

      try {
        const model = modelSelect.value;
        const reply = await getAIResponse(msg, model);
        loadingMsg.remove();
        addMessage(reply, 'bot');
      } catch (err) {
        loadingMsg.remove();
        addMessage(`Erro: ${err.message}`, 'bot');
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    async function getAIResponse(prompt, model) {
      if (model === 'deepseek') {
        const res = await fetch('https://api.deepseek.com/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${CONFIG.DS_TOKEN}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [
              { role: 'system', content: 'Você é o Oráculo, um assistente útil e direto. Responda sempre em português.' },
              { role: 'user', content: prompt }
            ],
            temperature: 0.7,
            max_tokens: 2000
          })
        });
        if (!res.ok) throw new Error(`DeepSeek: ${res.status}`);
        const data = await res.json();
        return data.choices[0].message.content;
      }

      if (model === 'auto') {
        const models = [
          'deepseek-ai/DeepSeek-V3',
          'Qwen/Qwen2.5-72B-Instruct'
        ];

        for (const hfModel of models) {
          try {
            const res = await fetch(`https://api-inference.huggingface.co/models/${hfModel}`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${CONFIG.HF_TOKEN}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ inputs: prompt })
            });
            if (!res.ok) continue;
            const data = await res.json();
            if (data[0]?.generated_text) return data[0].generated_text;
          } catch { continue; }
        }
        throw new Error('Nenhum modelo disponível no momento.');
      }

      throw new Error('Modelo não reconhecido.');
    }
  </script>
</body>
</html>
